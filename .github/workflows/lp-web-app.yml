name: Deploy web app

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/lp-web-app.yml"
      - ".env.example"
      - "src/**"
      - "index.html"
      - "package.json"
      - "pnpm-lock.yaml"
      - "vite.config.ts"
      - "tsconfig*.json"
      - "tailwind.config.ts"
      - "postcss.config.js"
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: us-east-1
  S3_BUCKET_WEBAPP: lp-web-app-dev-195802271670
  CF_DIST_WEBAPP: E2Z51Q1QOKFW73
  VITE_API_URL: https://bz3sk0ouyl.execute-api.us-east-1.amazonaws.com
  VITE_BASE_SHORT_URL: https://dq3f4b1yhm95q.cloudfront.net
  VITE_ANALYTICS_URL: https://d1gk8s6mgxls13.cloudfront.net

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.1.1

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build
        env:
          VITE_API_URL: ${{ env.VITE_API_URL }}
          VITE_BASE_SHORT_URL: ${{ env.VITE_BASE_SHORT_URL }}
          VITE_ANALYTICS_URL: ${{ env.VITE_ANALYTICS_URL }}

      - name: Validate AWS secrets
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          test -n "$AWS_ACCESS_KEY_ID" || (echo "Missing repository secret AWS_ACCESS_KEY_ID" && exit 1)
          test -n "$AWS_SECRET_ACCESS_KEY" || (echo "Missing repository secret AWS_SECRET_ACCESS_KEY" && exit 1)

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync S3
        run: aws s3 sync dist "s3://${{ env.S3_BUCKET_WEBAPP }}" --delete

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id "${{ env.CF_DIST_WEBAPP }}" --paths "/*"
